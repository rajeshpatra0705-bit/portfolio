<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: black;
            color: #ff0062;
            font-family: Consolas, monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* Fade-in animation */
        section {
            padding: 60px 30px;
            min-height: 100vh;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeIn 1.5s ease forwards;
        }

        section:nth-child(2) {
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        nav {
            padding: 15px;
            border-bottom: 1px solid #ff0062;
            text-align: center;
            animation: slideDown 1s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        nav a {
            color: #00ff00;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff0062;
        }

        h1 {
            font-size: 40px;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0;}
            100% {opacity: 1;}
        }

        .link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .link:hover {
            background: #ff0062;
            color: black;
            transform: scale(1.05);
        }

        input, textarea {
            background: black;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px;
            width: 300px;
            margin-top: 10px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff00;
        }

        button {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ff00;
            color: black;
            transform: scale(1.05);
        }

        /* Typing text style */
        .typing {
            color: #00ff00;
            font-size: 18px;
        }

    </style>
</head>

<body>

<nav>
    <a href="#home">🏠 Home</a>
    <a href="#contact">📩 Contact</a>
</nav>

<section id="home">
    <h1>> Hello, I am Rajesh Patra 💻<span class="blink">_</span></h1>
    <p class="typing" id="typing-text"></p>

    <a class="link" href="https://www.instagram.com/_itz_editz__07" target="_blank">
        📸 Follow Me on Instagram
    </a>
</section>

<section id="contact">
    <h1>> 📩 Contact Me</h1>
    <p>> Send me a message 💬</p>

    <form>
        <input type="text" placeholder="👤 Your Name"><br>
        <input type="email" placeholder="📧 Your Email"><br>
        <textarea rows="5" placeholder="✍️ Your Message"></textarea><br>
        <button type="submit">🚀 Send Message</button>
    </form>
</section>

<script>
    // Typing animation
    const text = "🎓 Student | 🚀 Future Developer | 🔐 Tech Enthusiast";
    let i = 0;
    function typingEffect() {
        if (i < text.length) {
            document.getElementById("typing-text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typingEffect, 50);
        }
    }
    typingEffect();
</script>

</body>
</html>
